<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="/game/index.css">
    <link rel="icon" type="image/png" href="/assets/tetris.png">
</head>
<body>
    <div class="game">
        <div class="board"></div>
        <div class="info">
            <canvas class="preview" width="120" height="120"></canvas>
            <div class="figures">
                <p class="figures-level">Level: <span class="figures-level-num">1</span></p>
                <p class="figures-score">Score: <span class="figures-score-num">0</span></p>
                <p class="figures-lines">Lines: <span class="figures-lines-num">0</span></p>
            </div>
            <div class="options">
                <button class="options-pause"><img class="options-btn-img" src="/assets/pause.svg"></button>
                <button class="options-reset"><img class="options-btn-img" src="/assets/reset.svg"></button>
                <button class="options-settings"><img class="options-btn-img" src="/assets/settings.svg"></button>
            </div>
        </div>
    </div>
    
    <script src="/game/index.js"></script>
</body>
</html>
